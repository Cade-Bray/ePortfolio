<div class="container mt-5">
  <div class="row justify-content-center">
    <div class="col-md-6">
      <div class="card">
        <div class="card-header">
          <h2 class="mb-0">Edit Device</h2>
        </div>
        <div class="card-body">
          @if (device) {
            <form (ngSubmit)="saveDevice()">
              <div class="mb-3">
                <label for="name" class="form-label">Name</label>
                <input type="text" class="form-control" id="name" name="name" [(ngModel)]="device.name" />
              </div>

              <div class="mb-3">
                <label for="setTemp" class="form-label">Set Temp</label>
                <input type="number" class="form-control" id="setTemp" name="setTemp" step="0.5" [(ngModel)]="device.setTemp" />
              </div>

              <!-- Authorized User section. Future enhancement will be able to add or remove users from the list
              <div class="mb-3">
                <label for="authUserEmail" class="form-label">Authorized User Email</label>
                <input type="email" class="form-control" id="authUserEmail" name="authUserEmail" [(ngModel)]="authUserEmail" placeholder="user@example.com" />
              </div>
              -->

              <div class="d-flex gap-2 justify-content-center">
                <button type="submit" class="btn btn-primary">Save</button>
                <button type="button" class="btn btn-secondary" routerLink="/home">Cancel</button>
              </div>
            </form>
          } @else {
            <p class="text-muted">No device loaded.</p>
          }
        </div>
      </div>
    </div>
  </div>
</div>
